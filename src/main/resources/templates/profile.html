<th:block xmlns:th="http://www.thymeleaf.org"
          xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

    <!--START-->
    <th:block th:insert="~{parts/page_template :: start}"/>

    <!--NAVBAR-->
    <th:block th:insert="~{parts/navbar}"/>

    <hr class="my-4">

    <div class="text-center h2 mb-3">Edit profile</div>

    <div class="h4 my-3 ml-3">User: <span th:text="${username}"></span></div>

    <div class="container">
        <form method="post">
            <div class="form-group row">
                <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
                <div class="col-sm-10">
                    <input type="password" name="password"
                           th:class="${passwordError}?'is-invalid form-control':'form-control'" id="inputPassword" placeholder="enter new password">
                    <div th:if="${passwordError}" th:text="${passwordError}" class="invalid-feedback">
                        CCC
                    </div>
                </div>
            </div>
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">


            <div class="form-group row">
                <div class="col-sm-10">
                    <button  type="submit" class="btn btn-primary">Save</button>
                </div>
            </div>

        </form>
    </div>

    <hr class="my-4">

    <!--END-->
    <th:block th:insert="~{parts/page_template :: end}"/>

</th:block>
