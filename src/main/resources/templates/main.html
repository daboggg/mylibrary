<th:block xmlns:th="http://www.thymeleaf.org">

    <!--START-->
    <th:block th:insert="~{parts/page_template :: start}"/>

    <!--NAVBAR-->
    <th:block th:insert="~{parts/navbar}"/>

    <hr class="my-4">

    <!--ADD FORM-->
    <div th:replace="~{parts/add_form}"/>

    <hr class="my-4">

    <form class="form" th:action="@{/main}">
        <div class="row">
            <div class="col-sm-10">
                <input type="text" name="filter" class="form-control" id="filter" th:value="${filter}"
                       placeholder="enter search text">
            </div>
            <div class="col-sm-2">
                <button type="submit" class="btn btn-primary mb-2 btn-block">Search</button>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col">
                <div class="form-check">
                    <input th:checked="${type eq 'name' or type == null}" class="form-check-input" type="radio"
                           name="type" id="exampleRadios1" value="name">
                    <label class="form-check-label" for="exampleRadios1">
                        search by name
                    </label>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col">
                <div class="form-check">
                    <input th:checked="${type eq 'author'}" class="form-check-input" type="radio" name="type"
                           id="exampleRadios2" value="author">
                    <label class="form-check-label" for="exampleRadios2">
                        search by author
                    </label>
                </div>
            </div>
        </div>
    </form>

    <hr class="my-4">

    <!--LIST BOOK-->
    <th:block th:insert="~{parts/list_book}"/>

    <!--END-->
    <th:block th:insert="~{parts/page_template :: end}"/>

</th:block>
