<div class="mx-5" th:fragment="add_form" xmlns:th="http://www.thymeleaf.org">

    <form action="/add" method="post">
        <div class="form-group row">
            <label for="inputBookname" class="col-sm-2 col-form-label">Bookname</label>
            <div class="col-sm-10">
                <input type="text" name="bookname" class="form-control" id="inputBookname" placeholder="input book name">
            </div>
        </div>
        <div class="form-group row">
            <label for="inputAuthor" class="col-sm-2 col-form-label">Author</label>
            <div class="col-sm-10">
                <input type="text" name="author" class="form-control" id="inputAuthor" placeholder="author">
            </div>
        </div>
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <div class="form-group row">
            <div class="col-sm-10">
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </div>
    </form>

</div>
