<div xmlns:th="http://www.thymeleaf.org" th:fragment="login(isLoginPage)" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!--NAVBAR-->
    <th:block th:insert="parts/navbar"/>

    <hr class="my-4 mt-5">

    <div class="text-center h2 mb-3" th:text="${isLoginPage}?'Input login and password':'Registration'"></div>

    <div th:if="${message}">
        <div th:text="${message}" class="alert alert-danger" role="alert">
            Это светлое уведомление
        </div>
        <hr class="my-4 mt-3">
    </div>

    <!--<th:block th:if="${session.SPRING_SECURITY_LAST_EXCEPTION}" th:text="${session.SPRING_SECURITY_LAST_EXCEPTION.message}"></th:block>-->

   <!-- <th:block th:each="item:${session.getValueNames()}">
        <div th:text="${item.toString()}"></div>
    </th:block>-->

    <div class="container">
        <form th:action="${isLoginPage}?'/login':'/registration'" method="post">
            <div class="form-group row">
                <label for="inputUsername" class="col-sm-2 col-form-label">Username</label>
                <div class="col-sm-10">
                    <input type="text" name="username" th:value="${user}?${user.username}:_"
                           th:class="${usernameError}?'is-invalid form-control':'form-control'" id="inputUsername" placeholder="input username">
                    <div th:if="${usernameError}" th:text="${usernameError}" class="invalid-feedback">

                    </div>
                </div>
            </div>
            <div class="form-group row">
                <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
                <div class="col-sm-10">
                    <input type="password" name="password"
                           th:class="${passwordError}?'is-invalid form-control':'form-control'" id="inputPassword" placeholder="input password">
                    <div th:if="${passwordError}" th:text="${passwordError}" class="invalid-feedback">
                        CCC
                    </div>
                </div>
            </div>
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">


            <div class="form-group row">
                <div class="col-sm-10">
                    <button th:text="${not isLoginPage}?'Create':'Sign in'" type="submit" class="btn btn-primary"></button>
                </div>
            </div>

                <a th:if="${isLoginPage}" class="mt-2" href="/registration">Add new user</a>


        </form>
    </div>
    <hr class="my-4">

</div>
