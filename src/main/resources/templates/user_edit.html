<th:block xmlns:th="http://www.thymeleaf.org">

    <!--START-->
    <th:block th:insert="~{parts/page_template :: start}"/>

    <!--NAVBAR-->
    <th:block th:insert="~{parts/navbar}"/>

    <hr class="my-4">

    <div class="text-center h2 my-3">Editing users</div>

    <form method="post" action="/user" class="ml-3">
        <input type="hidden" name="userId" th:value="${user.id}">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
        <input type="text" name="username" th:value="${user.username}">
        <div th:each="role:${roles}">
            <input type="checkbox" th:name="${role}" th:checked="${user.roles.contains(role)}">
            <label th:text="${role}"></label>
        </div>
        <button type="submit">Save User</button>
    </form>

    <hr class="my-4">

    <!--END-->
    <th:block th:insert="~{parts/page_template :: end}"/>

</th:block>
